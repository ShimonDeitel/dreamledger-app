name: Dreamledger
options:
  bundleIdPrefix: com.shimondeitel.dreamjournal2
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Dreamledger:
    type: application
    platform: iOS
    sources:
      - path: Dreamledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dreamjournal2
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Dreamledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DreamledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DreamledgerTests
      - path: Dreamledger.storekit
    dependencies:
      - target: Dreamledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dreamjournal2.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DreamledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DreamledgerUITests
    dependencies:
      - target: Dreamledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dreamjournal2.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Dreamledger:
    build:
      targets:
        Dreamledger: all
        DreamledgerTests: [test]
        DreamledgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Dreamledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Dreamledger.storekit
      targets:
        - DreamledgerTests
        - DreamledgerUITests
    archive:
      config: Release
